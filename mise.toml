[tools]
rust = "stable"
go = "1.24"
node = "lts"

# Tasks auto-discover from .mise/tasks/ directory structure.
# Short aliases (e.g. "start" → "start:all") are defined via #MISE alias in the scripts.
#
# Available tasks (mise tasks ls):
#
#   start          Start everything (chain + nullifier + admin UI)
#   start:chain    Build + init + start single-validator chain
#   start:nf       Start nullifier PIR server and self-bootstrap
#   start:ui       Start admin UI dev server
#   start:ios      Build xcframework for simulator + open Xcode
#   stop           Stop all services
#   stop:chain     Stop only svoted
#   stop:nf        Stop only nf-server
#   stop:ui        Stop only admin UI
#   status         Show status of all services
#   logs           Tail merged logs
#   wire:local     Apply local wiring (path deps)
#   wire:remote    Remove local wiring (restore remote refs)
#   wire:status    Show current wiring state
#   wire:update    Regenerate wiring patches
#   git:sync       Clone missing repos or fetch existing
#   git:status     Show git status across all repos
#   git:branch     Create a feature branch across repos
#   git:push       Push all repos with unpushed commits
#   git:drift      Fetch origins and show ahead/behind
